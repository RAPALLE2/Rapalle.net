<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halloween Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Spider Webs */
        .web {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .web svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: rgba(255, 255, 255, 0.5);
            stroke-width: 2;
        }

        /* Ghosts */
        .ghost {
            position: absolute;
            width: 50px;
            height: 50px;
            animation: float 5s linear infinite;
        }

        .ghost::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .ghost::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Bats */
        .bat {
            position: absolute;
            width: 40px;
            height: 40px;
            animation: fly 3s linear infinite;
        }

        .bat::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 20px;
            height: 20px;
            background-color: black;
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        .bat::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 20px;
            height: 20px;
            background-color: black;
            clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0);
            }
        }

        @keyframes fly {
            0% {
                transform: translateX(0) translateY(0);
            }

            100% {
                transform: translateX(100vw) translateY(-50vh);
            }
        }
    </style>
</head>

<body>
    <div class="web">
        <svg viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" />
            <circle cx="50" cy="50" r="35" />
            <circle cx="50" cy="50" r="25" />
            <circle cx="50" cy="50" r="15" />
            <line x1="50" y1="0" x2="50" y2="100" />
            <line x1="0" y1="50" x2="100" y2="50" />
            <line x1="0" y1="0" x2="100" y2="100" />
            <line x1="0" y1="100" x2="100" y2="0" />
        </svg>
    </div>

    <script>
        function createGhost() {
            const ghost = document.createElement('div');
            ghost.classList.add('ghost');

            // Set random position
            ghost.style.left = Math.random() * window.innerWidth + 'px';
            ghost.style.top = window.innerHeight + 'px';

            document.body.appendChild(ghost);

            // Animate ghost flying
            setTimeout(() => {
                ghost.style.transition = 'top 5s linear';
                ghost.style.top = -50 + 'px'; // Move off the top of the screen
            }, 100);

            // Remove ghost after animation
            setTimeout(() => {
                ghost.remove();
            }, 5000);
        }

        function createBat() {
            const bat = document.createElement('div');
            bat.classList.add('bat');

            // Set random position
            bat.style.left = Math.random() * window.innerWidth + 'px';
            bat.style.top = Math.random() * window.innerHeight + 'px';

            document.body.appendChild(bat);

            // Animate bat flying
            setTimeout(() => {
                bat.style.transition = 'top 3s linear, left 3s linear';
                bat.style.top = -50 + 'px'; // Move off the top of the screen
                bat.style.left = Math.random() * window.innerWidth + 'px'; // Random horizontal movement
            }, 100);

            // Remove bat after animation
            setTimeout(() => {
                bat.remove();
            }, 3000);
        }

        // Create ghosts and bats at intervals
        setInterval(createGhost, 1500);
        setInterval(createBat, 3000);
    </script>
</body>

</html>
