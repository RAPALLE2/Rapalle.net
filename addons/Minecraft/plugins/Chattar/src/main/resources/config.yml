#SETTINGS------------------------------------------------------------

# chattars prefix for example in chat before every command output
Prefix: "&9Chattar"

# is this plugin active
Active: true

#LISTENERS-----------------------------------------------------------

#---Connection Listeners
# send [+] {Player} if Player joins the server
Join: true
# send [-] {Player} if Player leaves the server
Leave: true

#COMMANDS------------------------------------------------------------
#---chattarhelp
#shows all commads listed
#permission: chattar.help

#---chattarversion
#tells the version
#permission: chattar.var

#---chattarreload
#reloads the config.yml
#permission: chattar.reload

#---chattarreset
#resets the config.yml to standard
#permission: chattar.reset

